<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Highlighter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 380px;
      max-height: 500px;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #fff;
      color: #202124;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #e0e0e0;
      background: #fafafa;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h2 {
      font-size: 16px;
      font-weight: 600;
    }
    .header .count {
      font-size: 12px;
      color: #5f6368;
      background: #e8eaed;
      border-radius: 12px;
      padding: 2px 10px;
    }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
      color: #5f6368;
    }
    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.4;
    }
    .empty-state p {
      font-size: 14px;
      line-height: 1.5;
      max-width: 280px;
    }
    .highlight-item {
      padding: 12px 16px;
      border-bottom: 1px solid #e8eaed;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .highlight-item:hover {
      background: #f1f3f4;
    }
    .highlight-text {
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 6px;
      word-break: break-word;
      /* Clamp to 3 lines */
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .highlight-meta {
      font-size: 11px;
      color: #5f6368;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .highlight-source {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 220px;
    }
    .highlight-date {
      flex-shrink: 0;
      margin-left: 8px;
    }
    .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      line-height: 24px;
      text-align: center;
      color: #5f6368;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
    }
    .highlight-item:hover .delete-btn {
      opacity: 1;
    }
    .delete-btn:hover {
      background: #e8eaed;
      color: #d93025;
    }
    .loading {
      padding: 32px;
      text-align: center;
      color: #5f6368;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>🔖 Выделения</h2>
    <span class="count" id="count">0</span>
  </div>
  <div id="highlight-list"></div>
  <script src="popup.js"></script>
</body>
</html>
